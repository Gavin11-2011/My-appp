<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;

background:linear-gradient(-45deg,
#000000,
#061a40,
#0b3d91,
#3a0ca3,
#7209b7,
#c8b6ff);

background-size:600% 600%;
animation:bgMove 14s ease infinite;

}

@keyframes bgMove{

0%{background-position:0% 50%;}
25%{background-position:50% 0%;}
50%{background-position:100% 50%;}
75%{background-position:50% 100%;}
100%{background-position:0% 50%;}

}

body::before{

content:"";
position:absolute;
width:500px;
height:500px;
border-radius:50%;
background:#ffffff20;
filter:blur(120px);
top:-120px;
left:-120px;

}

body::after{

content:"";
position:absolute;
width:450px;
height:450px;
border-radius:50%;
background:#ffffff10;
filter:blur(120px);
bottom:-120px;
right:-120px;

}

.calculator{

position:relative;

width:360px;

padding:25px;

border-radius:25px;

background:rgba(255,255,255,.10);

backdrop-filter:blur(20px);

box-shadow:
0 0 40px rgba(0,0,0,.4),
0 0 20px rgba(120,120,255,.3);

animation:pop .8s;

}

@keyframes pop{

from{
opacity:0;
transform:scale(.8);
}

to{
opacity:1;
transform:scale(1);
}

}

.display{

width:100%;

height:75px;

border:none;

outline:none;

border-radius:15px;

padding:15px;

font-size:32px;

text-align:right;

background:rgba(255,255,255,.15);

color:white;

margin-bottom:20px;

box-shadow:inset 0 0 15px rgba(255,255,255,.15);

}

.buttons{

display:grid;

grid-template-columns:repeat(4,1fr);

gap:12px;

}

button{

height:65px;

border:none;

border-radius:15px;

font-size:22px;

cursor:pointer;

background:rgba(255,255,255,.12);

color:white;

transition:.25s;

box-shadow:
0 0 12px rgba(255,255,255,.1);

}

button:hover{

transform:translateY(-3px) scale(1.05);

background:rgba(255,255,255,.22);

box-shadow:
0 0 18px #7f5af0;

}

button:active{

transform:scale(.94);

}

.operator{

background:#3b82f6;

}

.operator:hover{

background:#2563eb;

}

.equal{

grid-column:span 2;

background:#7c3aed;

}

.equal:hover{

background:#6d28d9;

}

.clear{

background:#ef4444;

}

.clear:hover{

background:#dc2626;

}

.delete{

background:#f59e0b;

}

.delete:hover{

background:#d97706;

}

</style>
</head>

<body>

<div class="calculator">

<input
type="text"
id="display"
class="display"
readonly>

<div class="buttons">

<button class="clear">AC</button>
<button class="delete">⌫</button>
<button class="operator">%</button>
<button class="operator">/</button>

<button>7</button>
<button>8</button>
<button>9</button>
<button class="operator">*</button>

<button>4</button>
<button>5</button>
<button>6</button>
<button class="operator">-</button>

<button>1</button>
<button>2</button>
<button>3</button>
<button class="operator">+</button>

<button>0</button>
<button>.</button>
<button class="equal">=</button>

</div>

</div>

<script>

const display=document.getElementById("display");

const buttons=document.querySelectorAll("button");

buttons.forEach(button=>{

button.addEventListener("click",()=>{

const value=button.innerText;

switch(value){

case "AC":

display.value="";

break;

case "⌫":

display.value=display.value.slice(0,-1);

break;

case "=":

try{

display.value=eval(display.value);

}

catch{

display.value="Error";

}

break;

default:

display.value+=value;

}

});

});

document.addEventListener("keydown",e=>{

const key=e.key;

if("0123456789+-*/.%".includes(key))
display.value+=key;

else if(key==="Enter"){

try{

display.value=eval(display.value);

}
catch{

display.value="Error";

}

}

else if(key==="Backspace"){

display.value=display.value.slice(0,-1);

}

else if(key==="Escape"){

display.value="";

}

});

</script>

</body>
</html>
