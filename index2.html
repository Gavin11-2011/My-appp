<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Card</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4b3b72,#7763c5,#c8b6ff);
overflow:hidden;
}

body::before{
content:'';
position:absolute;
width:500px;
height:500px;
background:rgba(255,255,255,.12);
border-radius:50%;
top:-150px;
left:-120px;
filter:blur(120px);
}

body::after{
content:'';
position:absolute;
width:450px;
height:450px;
background:rgba(255,255,255,.08);
border-radius:50%;
bottom:-150px;
right:-100px;
filter:blur(120px);
}

.card{
position:relative;
width:380px;
padding:30px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(18px);
border-radius:25px;
box-shadow:0 20px 40px rgba(0,0,0,.25);
color:white;
text-align:center;
animation:fade .8s;
}

h1{
margin-bottom:20px;
}

.search{
display:flex;
gap:10px;
margin-bottom:20px;
}

input{
flex:1;
padding:12px;
border:none;
outline:none;
border-radius:12px;
font-size:16px;
}

button{
padding:12px 18px;
border:none;
border-radius:12px;
background:#7f5af0;
color:white;
cursor:pointer;
font-weight:bold;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
background:#6240d5;
}

.weather-icon{
width:100px;
margin:10px auto;
display:none;
}

.temp{
font-size:48px;
font-weight:bold;
margin-top:10px;
}

.city{
font-size:24px;
margin-top:10px;
}

.desc{
font-size:18px;
margin-bottom:20px;
text-transform:capitalize;
}

.info{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
text-align:left;
margin-top:20px;
}

.box{
background:rgba(255,255,255,.12);
padding:15px;
border-radius:15px;
}

.error{
margin-top:15px;
color:#ffe0e0;
font-weight:bold;
}

@keyframes fade{
from{
opacity:0;
transform:scale(.9);
}
to{
opacity:1;
transform:scale(1);
}
}
</style>

</head>
<body>

<div class="card">

<h1>🌤 Weather Card</h1>

<div class="search">
<input
type="text"
id="city"
placeholder="Enter city...">
<button onclick="getWeather()">Search</button>
</div>

<img class="weather-icon" id="icon">

<div class="city" id="cityName"></div>

<div class="temp" id="temp"></div>

<div class="desc" id="description"></div>

<div class="info">

<div class="box">
💧 Humidity
<br>
<b id="humidity">--</b>
</div>

<div class="box">
🌬 Wind
<br>
<b id="wind">--</b>
</div>

<div class="box">
🌅 Sunrise
<br>
<b id="sunrise">--</b>
</div>

<div class="box">
🌇 Sunset
<br>
<b id="sunset">--</b>
</div>

</div>

<div class="error" id="error"></div>

</div>

<script>

const apiKey="YOUR_API_KEY";

document
.getElementById("city")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
getWeather();
}

});

function timeConverter(unix){

let date=new Date(unix*1000);

return date.toLocaleTimeString([],{
hour:'2-digit',
minute:'2-digit'
});

}

async function getWeather(){

let city=document.getElementById("city").value.trim();

if(city==="") return;

let url=
`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=${apiKey}`;

try{

let response=await fetch(url);

let data=await response.json();

if(data.cod!=200){

document.getElementById("error").innerHTML="City not found.";
return;

}

document.getElementById("error").innerHTML="";

document.getElementById("cityName").innerHTML=
data.name+", "+data.sys.country;

document.getElementById("temp").innerHTML=
Math.round(data.main.temp)+"°C";

document.getElementById("description").innerHTML=
data.weather[0].description;

document.getElementById("humidity").innerHTML=
data.main.humidity+" %";

document.getElementById("wind").innerHTML=
data.wind.speed+" m/s";

document.getElementById("sunrise").innerHTML=
timeConverter(data.sys.sunrise);

document.getElementById("sunset").innerHTML=
timeConverter(data.sys.sunset);

let icon=document.getElementById("icon");

icon.src=
`https://openweathermap.org/img/wn/${data.weather[0].icon}@4x.png`;

icon.style.display="block";

}

catch{

document.getElementById("error").innerHTML=
"Unable to fetch weather.";

}

}

</script>

</body>
</html>
